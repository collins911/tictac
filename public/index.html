<script>
    const socket = io();
    let myPhone = null;
    let gameId = null;
    let mySymbol = null;
    let gameActive = false;
    let board = Array(9).fill(null);

    const $ = id => document.getElementById(id);
    const playBtn = $('play-btn');
    const boardWrap = $('board-wrap');

    function findMatch() {
        if (!myPhone) return showToast('Not authenticated', 'fail');
        
        playBtn.disabled = true;
        setStatus('Searching for opponent', 'active', true);
        socket.emit('find_match');

        // 🔴 FIX: Added Search Timeout to prevent stuck UI 
        setTimeout(() => {
            if (!gameActive && playBtn.disabled) {
                playBtn.disabled = false;
                setStatus('Ready to play', '');
                showToast('Search timed out. Try again.', 'warn');
            }
        }, 10000); 
    }

    socket.on('auth_success', ({ balance }) => {
        myPhone = $('phone-input').value.trim(); // Simplified for brevity
        $('wallet-balance').innerText = balance;
        $('auth-screen').classList.add('hidden');
        $('lobby-screen').classList.remove('hidden');
    });

    socket.on('match_found', (data) => {
        gameId = data.gameId;
        gameActive = true;
        $('lobby-screen').classList.add('hidden');
        boardWrap.classList.remove('hidden');
    });

    socket.on('init_game', ({ symbol }) => {
        mySymbol = symbol;
        setStatus(`Game Started! You are ${symbol}`, 'active');
    });

    socket.on('update_board', ({ board: newBoard, turn }) => {
        board = newBoard;
        renderBoard();
        if (turn === mySymbol) setStatus("Your Turn", "active");
        else if (turn) setStatus("Opponent's Turn", "");
    });

    socket.on('game_finished', ({ result, winner, prize }) => {
        gameActive = false;
        if (result === 'DRAW') showToast("It's a draw!", "");
        else if (winner === mySymbol) showToast(`Victory! Won KES ${prize}`, "success");
        else showToast("Defeat!", "fail");
        
        // Re-enable play button through reset
        setTimeout(() => {
            resetGameState();
        }, 3000);
    });

    function resetGameState() {
        gameId = null;
        gameActive = false;
        playBtn.disabled = false;
        boardWrap.classList.add('hidden');
        $('lobby-screen').classList.remove('hidden');
        setStatus('Ready to play', '');
    }

    function setStatus(text, className, pulse) {
        const s = $('status');
        s.innerText = text;
        s.className = className;
    }

    function showToast(msg, type) {
        console.log(`[TOAST] ${type}: ${msg}`);
    }
</script>
