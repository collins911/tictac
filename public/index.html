<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTac Cash</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00ff88;
            --red: #ff4560;
            --bg: #0a0a0a;
            --surface: #111111;
            --text: #e8e8e8;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .hidden { display: none !important; }
        .cell { width: 100px; height: 100px; border: 1px solid var(--green); display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .toast { position: fixed; top: 20px; background: var(--surface); padding: 10px 20px; border-radius: 5px; opacity: 0; transition: 0.3s; }
        .toast.show { opacity: 1; }
        .success { border-left: 4px solid var(--green); }
        .fail { border-left: 4px solid var(--red); }
        .active { color: var(--green); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <input type="text" id="phone-input" placeholder="Phone Number">
        <button onclick="login()">Login</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <h2>Balance: KES <span id="wallet-balance">0</span></h2>
        <button id="play-btn" onclick="findMatch()">Find Match (KES 50)</button>
        <p id="status">Ready to play</p>
    </div>

    <div id="board-wrap" class="hidden">
        <div class="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const socket = io();
        let myPhone = null;
        let gameId = null;
        let mySymbol = null;
        let gameActive = false;
        let board = Array(9).fill(null);

        const $ = id => document.getElementById(id);
        const playBtn = $('play-btn');
        const boardWrap = $('board-wrap');
        const cells = document.querySelectorAll('.cell');

        function login() {
            const phone = $('phone-input').value.trim();
            if (!phone) return showToast('Enter phone number', 'fail');
            myPhone = phone;
            socket.emit('auth', { phone });
        }

        socket.on('auth_success', ({ balance }) => {
            $('wallet-balance').innerText = balance;
            $('auth-screen').classList.add('hidden');
            $('lobby-screen').classList.remove('hidden');
        });

        // ─── MATCHMAKING FIXES ───
        function findMatch() {
            if (!myPhone) return showToast('Please login first', 'fail');
            
            playBtn.disabled = true;
            setStatus('Searching for opponent...', 'active', true);
            socket.emit('find_match');

            // 🔴 FIX: UI Timeout if matchmaking stalls
            setTimeout(() => {
                if (!gameActive && playBtn.disabled) {
                    playBtn.disabled = false;
                    setStatus('Ready to play', '');
                    showToast('Search timed out. Check balance or try again.', 'fail');
                }
            }, 10000); 
        }

        socket.on('waiting', () => {
            setStatus('Waiting for opponent...', 'active');
        });

        socket.on('match_found', (data) => {
            gameId = data.gameId;
            gameActive = true;
            $('lobby-screen').classList.add('hidden');
            boardWrap.classList.remove('hidden');
        });

        socket.on('init_game', ({ symbol, turn }) => {
            mySymbol = symbol;
            board = Array(9).fill(null);
            renderBoard();
            updateTurnUI(turn);
        });

        // ─── GAMEPLAY ───
        function makeMove(index) {
            if (!gameActive || board[index] || !gameId) return;
            socket.emit('make_move', { gameId, index });
        }

        socket.on('update_board', ({ board: newBoard, turn }) => {
            board = newBoard;
            renderBoard();
            updateTurnUI(turn);
        });

        function renderBoard() {
            cells.forEach((cell, i) => {
                cell.innerText = board[i] || '';
            });
        }

        function updateTurnUI(turn) {
            if (turn === mySymbol) setStatus("YOUR TURN", "active");
            else if (turn) setStatus("OPPONENT'S TURN", "");
        }

        socket.on('game_finished', ({ result, winner, prize }) => {
            gameActive = false;
            if (result === 'DRAW') showToast(`Draw! Refunded KES ${prize}`, '');
            else if (winner === mySymbol) showToast(`VICTORY! +KES ${prize}`, 'success');
            else showToast('DEFEAT!', 'fail');

            setTimeout(() => {
                resetToLobby();
            }, 3000);
        });

        socket.on('balance_update', ({ balance }) => {
            $('wallet-balance').innerText = balance;
        });

        socket.on('error_msg', msg => {
            showToast(msg, 'fail');
            playBtn.disabled = false;
            setStatus('Ready to play', '');
        });

        function resetToLobby() {
            gameId = null;
            gameActive = false;
            playBtn.disabled = false;
            boardWrap.classList.add('hidden');
            $('lobby-screen').classList.remove('hidden');
            setStatus('Ready to play', '');
        }

        function setStatus(text, className) {
            const s = $('status');
            s.innerText = text;
            s.className = className;
        }

        function showToast(msg, type) {
            const t = $('toast');
            t.innerText = msg;
            t.className = `toast show ${type}`;
            setTimeout(() => t.className = 'toast', 3000);
        }
    </script>
</body>
</html>
