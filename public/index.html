<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTac Cash</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--green:#00ff88;--green-glow:rgba(0,255,136,0.25);--red:#ff4560;--gold:#ffd700;--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:rgba(0,255,136,0.2);--text:#e8e8e8;--muted:#666}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
        .screen{position:relative;z-index:1;width:100%;max-width:460px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px}
        .hidden{display:none!important}
        .logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:3px;color:var(--green);text-shadow:0 0 25px var(--green-glow);line-height:1}
        .logo span{color:var(--text)}
        .card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .card-label{font-size:0.55rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
        input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--green);font-family:'DM Mono',monospace;font-size:0.9rem;width:100%;outline:none}
        input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow)}
        .pin-input{font-size:1.5rem!important;text-align:center;letter-spacing:6px}
        .btn{width:100%;padding:10px;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;cursor:pointer;transition:transform 0.15s}
        .btn:hover:not(:disabled){transform:translateY(-2px)}
        .btn:disabled{opacity:0.4;cursor:not-allowed}
        .btn-primary{background:var(--green);color:#000}
        .btn-outline{background:transparent;color:var(--green);border:1px solid var(--border);font-size:0.75rem;padding:8px}
        .btn-gold{background:var(--gold);color:#000}
        .btn-red{background:var(--red);color:#fff}
        .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,69,96,0.3);font-size:0.7rem;padding:7px}
        .btn-small{padding:6px 8px;font-size:0.65rem;width:auto}
        .chip-balance{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);text-shadow:0 0 15px rgba(255,215,0,0.3);letter-spacing:2px;text-align:center}
        .action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:8px}
        .action-row .btn{font-size:0.65rem;padding:8px 4px;letter-spacing:1px}
        #status{width:100%;padding:8px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);font-size:0.6rem;letter-spacing:1px;color:var(--muted);text-align:center;min-height:34px;display:flex;align-items:center;justify-content:center}
        #status.active{color:var(--green);border-color:var(--green)}
        .board-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:100%;max-width:250px}
        .cell{aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;color:var(--text);user-select:none}
        .cell:hover.clickable{background:var(--surface2);border-color:var(--green)}
        .cell.x{color:var(--green)}.cell.o{color:var(--red)}
        .cell.win-cell{background:rgba(0,255,136,0.1);border-color:var(--green);animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 10px var(--green-glow)}}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
        .overlay-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 16px;text-align:center;max-width:280px;width:100%;display:flex;flex-direction:column;gap:10px}
        .overlay-icon{font-size:2.5rem}.overlay-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem}.overlay-sub{font-size:0.55rem;color:var(--muted)}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px}
        .modal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px}
        .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px}
        .modal-note{font-size:0.5rem;color:var(--gold);background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.2);border-radius:6px;padding:6px 8px;text-align:center}
        .chip-pkg{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all 0.2s}
        .chip-pkg:hover{border-color:var(--gold)}
        .chip-pkg.selected{border-color:var(--green)}
        .collapsible-header{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:0.55rem;color:var(--muted);text-transform:uppercase;width:100%}
        .collapsible-content{max-height:0;overflow:hidden;transition:max-height 0.3s;width:100%}
        .collapsible-content.open{max-height:300px;overflow-y:auto}
        #toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%)translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:0.6rem;z-index:200;transition:transform 0.3s;white-space:nowrap}
        #toast.show{transform:translateX(-50%)translateY(0)}
        #toast.success{border-color:var(--green);color:var(--green)}
        #toast.fail{border-color:var(--red);color:var(--red)}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border)}
    </style>
</head>
<body>

<div class="screen" id="login-screen">
    <div class="logo">TicTac<span>Cash</span></div>
    <div class="card">
        <div id="phone-step">
            <div class="input-group"><label style="font-size:0.55rem;color:var(--muted)">Phone Number</label><input type="tel" id="phone-input" placeholder="2547XXXXXXXX"></div>
            <br><button class="btn btn-primary" id="continue-btn">Continue</button>
        </div>
        <div id="pin-step" class="hidden">
            <div style="text-align:center;font-size:0.65rem;color:var(--muted);margin-bottom:8px" id="pin-title">Enter PIN</div>
            <div class="input-group"><label style="font-size:0.55rem;color:var(--muted)" id="pin-label">4-Digit PIN</label><input type="password" id="pin-input" class="pin-input" placeholder="****" maxlength="4"></div>
            <div id="confirm-pin-group" class="input-group hidden"><label style="font-size:0.55rem;color:var(--muted)">Confirm PIN</label><input type="password" id="confirm-pin-input" class="pin-input" placeholder="****" maxlength="4"></div>
            <br><button class="btn btn-primary" id="submit-pin-btn">Enter</button>
            <button class="btn btn-outline" id="back-btn" style="margin-top:4px">← Back</button>
        </div>
    </div>
    <p style="font-size:0.5rem;color:var(--muted);text-align:center">Buy chips via M-Pesa: <b style="color:var(--gold)">254702887496</b></p>
</div>

<div class="screen hidden" id="game-screen">
    <div class="card">
        <div class="card-header"><span class="card-label">Balance</span><span id="wallet-phone" style="font-size:0.5rem;color:var(--muted)"></span></div>
        <div class="chip-balance" id="chip-balance">🪙 0</div>
        <div class="action-row">
            <button class="btn btn-outline" id="buy-chips-btn" style="color:var(--gold);border-color:rgba(255,215,0,0.3)">🎰 Buy</button>
            <button class="btn btn-outline" id="transfer-btn">💸 Send</button>
            <button class="btn btn-outline" id="withdraw-btn" style="color:var(--red);border-color:rgba(255,69,96,0.3)">🏦 Cash Out</button>
        </div>
    </div>
    
    <div class="collapsible-header" id="invite-toggle"><span>👥 Invite</span><span id="invite-arrow">▼</span></div>
    <div class="collapsible-content" id="invite-content">
        <div style="padding:8px;display:flex;flex-direction:column;gap:6px">
            <button class="btn btn-primary btn-small" id="create-room-btn">🏠 Create Room</button>
            <div style="display:flex;gap:4px"><input type="text" id="room-code-input" style="flex:1;text-transform:uppercase;text-align:center;font-size:0.9rem" placeholder="CODE" maxlength="6"><button class="btn btn-primary btn-small" id="join-room-btn" style="width:auto">Join</button></div>
            <div id="room-created-view" class="hidden" style="text-align:center">
                <div style="font-size:0.5rem;color:var(--muted)">Room Code</div>
                <div id="display-room-code" style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--green)"></div>
                <div style="display:flex;gap:4px;margin-top:4px"><input type="text" id="invite-link" style="flex:1;font-size:0.5rem;text-align:center" readonly><button class="btn btn-outline btn-small" id="copy-code-btn">📋</button></div>
                <button class="btn btn-danger btn-small" id="cancel-room-btn" style="margin-top:4px">Cancel</button>
            </div>
        </div>
    </div>
    
    <div id="status">Buy chips to play</div>
    
    <div class="board-wrap hidden" id="board-wrap">
        <div style="width:100%;display:flex;justify-content:space-between;font-size:0.5rem;color:var(--muted)">
            <span>X <span id="indicator-x-label">YOU</span></span><span>VS</span><span id="indicator-o-label">OPP</span><span> O</span>
        </div>
        <div class="grid" id="board"></div>
    </div>
    
    <div style="width:100%;display:flex;justify-content:space-between;font-size:0.5rem;color:var(--muted);padding:4px 8px;background:var(--surface);border-radius:6px">
        <span>🟢 <span id="online-count">0</span></span><span>🔍 <span id="searching-count">0</span></span>
    </div>
    
    <button class="btn btn-primary" id="play-btn">🔍 Play — 50 🪙</button>
    <button class="btn btn-danger hidden" id="cancel-btn">✕ Cancel</button>
    <button class="btn btn-danger" id="logout-btn">Disconnect</button>
</div>

<!-- BUY CHIPS MODAL -->
<div class="modal hidden" id="buy-chips-modal"><div class="modal-card">
    <div class="modal-title" style="color:var(--gold)">Buy Chips</div>
    <div class="modal-note">Send M-Pesa to <b>254702887496</b><br>Enter code after payment</div>
    <div class="chip-pkg" onclick="selectPkg(50,50,0)"><div><b>50 🪙</b><br><small>KES 50</small></div></div>
    <div class="chip-pkg" onclick="selectPkg(100,100,0)"><div><b>100 🪙</b><br><small>KES 100</small></div></div>
    <div class="chip-pkg" onclick="selectPkg(200,200,0)"><div><b>200 🪙</b><br><small>KES 200</small></div></div>
    <div id="pay-info" class="hidden">
        <div class="modal-note">Amount: <b id="mpesa-amt">KES 50</b></div>
        <input type="text" id="mpesa-code" placeholder="M-Pesa Code" style="text-transform:uppercase;margin-top:4px">
        <button class="btn btn-gold" id="verify-pay-btn">Submit for Approval</button>
        <div id="verify-status" style="text-align:center;font-size:0.55rem;display:none"></div>
    </div>
    <button class="btn btn-outline" id="close-chip-modal">Close</button>
</div></div>

<!-- TRANSFER MODAL -->
<div class="modal hidden" id="transfer-modal"><div class="modal-card">
    <div class="modal-title" style="color:var(--gold)">Send Chips</div>
    <input type="tel" id="transfer-phone" placeholder="Phone (2547XXXXXXXX)">
    <input type="number" id="transfer-amount" placeholder="Amount (min 10)" min="10">
    <input type="password" id="transfer-pin" class="pin-input" placeholder="PIN" maxlength="4">
    <button class="btn btn-gold" id="send-transfer-btn">Send</button>
    <button class="btn btn-outline" id="close-transfer-modal">Cancel</button>
</div></div>

<!-- CASH OUT MODAL -->
<div class="modal hidden" id="withdraw-modal"><div class="modal-card">
    <div class="modal-title" style="color:var(--red)">Cash Out</div>
    <div class="modal-note">Min 100 chips. Fee: 5 chips.</div>
    <input type="number" id="withdraw-chips" placeholder="Chips (min 100)" min="100">
    <input type="password" id="withdraw-pin" class="pin-input" placeholder="PIN" maxlength="4">
    <button class="btn btn-red" id="submit-withdraw-btn">Request Withdrawal</button>
    <button class="btn btn-outline" id="close-withdraw-modal">Cancel</button>
</div></div>

<!-- RESULT OVERLAY -->
<div class="overlay hidden" id="result-overlay"><div class="overlay-card">
    <div class="overlay-icon" id="result-icon"></div>
    <div class="overlay-title" id="result-title"></div>
    <div class="overlay-sub" id="result-sub"></div>
    <button class="btn btn-primary" id="dismiss-result">Play Again</button>
</div></div>

<div id="toast"></div>

<script>
(function(){
let socket,myPhone=null,gameId=null,mySymbol=null,currentTurn='X',board=Array(9).fill(null),gameActive=false,isRegistering=false,checkedPhone=null,selectedPkg=null,myChips=0;
const BASE=window.location.origin,$=id=>document.getElementById(id);
let tt;function toast(m,t=''){const el=$('toast');el.textContent=m;el.className='show '+t;clearTimeout(tt);tt=setTimeout(()=>el.className='',2500)}
function showPhone(){$('phone-step').classList.remove('hidden');$('pin-step').classList.add('hidden')}
function showPin(){$('phone-step').classList.add('hidden');$('pin-step').classList.remove('hidden')}
function checkUser(){const r=$('phone-input').value.trim();if(!r)return toast('Enter phone','fail');checkedPhone=r;socket.emit('check_user',{phone:r})}
function submitPin(){const p=$('pin-input').value.trim();if(!p||p.length!==4)return toast('Enter 4-digit PIN','fail');if(isRegistering){if(p!==$('confirm-pin-input').value.trim())return toast('PINs mismatch','fail');socket.emit('register',{phone:checkedPhone,pin:p})}else socket.emit('auth',{phone:checkedPhone,pin:p})}
function updChips(b){myChips=b;$('chip-balance').textContent='🪙 '+b}
function showBuyChips(){$('buy-chips-modal').classList.remove('hidden');$('pay-info').classList.add('hidden');selectedPkg=null}
function hideBuyChips(){$('buy-chips-modal').classList.add('hidden')}
function selectPkg(chips,price,bonus){selectedPkg={chips,price,bonus};$('pay-info').classList.remove('hidden');$('mpesa-amt').textContent='KES '+price}
async function verifyPay(){const c=$('mpesa-code').value.trim().toUpperCase();if(!c||!selectedPkg)return toast('Enter M-Pesa code','fail');const s=$('verify-status');s.style.display='block';s.innerHTML='Submitting...';const r=await fetch('/api/chips/verify-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:myPhone,mpesaCode:c,chips:selectedPkg.chips,amount:selectedPkg.price,bonus:selectedPkg.bonus})});const d=await r.json();if(r.ok){s.innerHTML='✅ Awaiting approval.';setTimeout(hideBuyChips,2500)}else s.innerHTML='❌ '+d.error}
function showTransfer(){$('transfer-modal').classList.remove('hidden')}
function hideTransfer(){$('transfer-modal').classList.add('hidden');$('send-transfer-btn').disabled=false}
function sendTransfer(){const p=$('transfer-phone').value.trim(),a=parseInt($('transfer-amount').value),pin=$('transfer-pin').value.trim();if(!p||!a||a<10||!pin||pin.length!==4)return toast('Fill all fields','fail');socket.emit('transfer_chips',{recipientPhone:p,amount:a,pin});$('send-transfer-btn').disabled=true}
function showWithdraw(){$('withdraw-modal').classList.remove('hidden')}
function hideWithdraw(){$('withdraw-modal').classList.add('hidden')}
function submitWithdraw(){const c=parseInt($('withdraw-chips').value),pin=$('withdraw-pin').value.trim();if(!c||c<100||!pin||pin.length!==4)return toast('Min 100 chips + PIN','fail');fetch('/api/chips/withdraw',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:myPhone,chips:c,pin})}).then(r=>r.json()).then(d=>{if(d.msg){toast(d.msg,'success');updChips(d.newBalance)}else toast(d.error,'fail');hideWithdraw()}).catch(()=>toast('Error','fail'))}
function createRoom(){socket.emit('create_private_room')}
function joinRoom(c){const cd=c||$('room-code-input').value.trim().toUpperCase();if(!cd||cd.length<4)return toast('Enter code','fail');socket.emit('join_private_room',{roomCode:cd})}
function cancelRoom(){socket.emit('cancel_private_room')}
function togInvite(){$('invite-content').classList.toggle('open');$('invite-arrow').textContent=$('invite-content').classList.contains('open')?'▲':'▼'}
function initBoard(){$('board').innerHTML='';for(let i=0;i<9;i++){const c=document.createElement('div');c.className='cell';c.dataset.index=i;c.addEventListener('click',()=>makeMove(i));$('board').appendChild(c)}}
function makeMove(i){if(!gameActive||currentTurn!==mySymbol||board[i])return;socket.emit('make_move',{gameId,index:i})}
function applyMove(i,s){board[i]=s;const c=$('board').children[i];c.textContent=s;c.className='cell '+s.toLowerCase()}
function updTurn(){if(!gameActive)return;if(currentTurn===mySymbol){setStatus('Your turn','active');[...$('board').children].forEach((c,i)=>{if(!board[i])c.classList.add('clickable')})}else{setStatus("Opponent's turn");[...$('board').children].forEach(c=>c.classList.remove('clickable'))}}
function hlWin(s){const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];const b=[...$('board').children].map(c=>c.textContent);for(const[a,bc,c]of w){if(b[a]===s&&b[bc]===s&&b[c]===s)[a,bc,c].forEach(i=>$('board').children[i].classList.add('win-cell'))}}
function showResult(ic,t,s){$('result-icon').textContent=ic;$('result-title').textContent=t;$('result-sub').textContent=s;$('result-overlay').classList.remove('hidden')}
function dismissResult(){$('result-overlay').classList.add('hidden');resetGame()}
function resetGame(){gameId=null;mySymbol=null;gameActive=false;board=Array(9).fill(null);currentTurn='X';initBoard();$('board-wrap').classList.add('hidden');$('play-btn').classList.remove('hidden');$('play-btn').disabled=false;$('cancel-btn').classList.add('hidden');setStatus('Buy chips to play')}
function setStatus(m,t=''){$('status').className=t?'active '+t:'';$('status').textContent=m}
function logout(){socket.disconnect();myPhone=null;gameActive=false;$('game-screen').classList.add('hidden');$('login-screen').classList.remove('hidden');setTimeout(initSocket,100)}
function findMatch(){if(!myPhone)return toast('Login required','fail');$('play-btn').disabled=true;setStatus('Searching...','active');socket.emit('find_match')}
function cancelSearch(){socket.emit('cancel_search')}

function initSocket(){
    if(socket){socket.removeAllListeners();socket.disconnect()}
    socket=io({transports:['websocket','polling'],reconnection:true});
    socket.on('user_check_result',({exists,phone})=>{isRegistering=!exists;checkedPhone=phone;showPin();if(isRegistering){$('pin-title').textContent='Create PIN';$('confirm-pin-group').classList.remove('hidden');$('submit-pin-btn').textContent='Create Account'}else{$('pin-title').textContent='Enter PIN';$('confirm-pin-group').classList.add('hidden');$('submit-pin-btn').textContent='Enter'}});
    socket.on('registration_success',({phone})=>{toast('Account created! Login.','success');setTimeout(()=>{showPhone();$('phone-input').value=phone},1500)});
    socket.on('auth_success',({chips})=>{myPhone=checkedPhone;$('wallet-phone').textContent=myPhone;updChips(chips);$('login-screen').classList.add('hidden');$('game-screen').classList.remove('hidden');setStatus(chips>0?'Ready':'Buy chips to play');showPhone();});
    socket.on('balance_update',({chips})=>updChips(chips));
    socket.on('online_count',({online,searching})=>{$('online-count').textContent=online;$('searching-count').textContent=searching});
    socket.on('waiting',()=>{setStatus('Searching...','active');$('play-btn').classList.add('hidden');$('cancel-btn').classList.remove('hidden')});
    socket.on('search_cancelled',()=>{setStatus('Ready');$('play-btn').disabled=false;$('play-btn').classList.remove('hidden');$('cancel-btn').classList.add('hidden')});
    socket.on('match_found',({gameId:gId,playerX})=>{gameId=gId;mySymbol=socket.id===playerX?'X':'O';currentTurn='X';board=Array(9).fill(null);gameActive=true;$('indicator-x-label').textContent=mySymbol==='X'?'YOU':'OPP';$('indicator-o-label').textContent=mySymbol==='O'?'YOU':'OPP';initBoard();$('board-wrap').classList.remove('hidden');$('play-btn').classList.add('hidden');$('cancel-btn').classList.add('hidden');updTurn();toast('Match found!','success')});
    socket.on('move_made',({index,symbol,nextTurn})=>{applyMove(index,symbol);currentTurn=nextTurn;updTurn()});
    socket.on('game_finished',({result,winnerSocketId,prize,refund})=>{gameActive=false;[...$('board').children].forEach(c=>c.classList.remove('clickable'));if(result==='DRAW'){showResult('🤝','DRAW',refund+' chips back');setStatus('Draw')}else if(result==='FORFEIT'){showResult('🏆','WIN',prize+' chips');setStatus('Opponent left')}else{const w=socket.id===winnerSocketId;if(w){hlWin(result);showResult('💰','YOU WIN!','+'+prize+' chips');setStatus('Winner!')}else{hlWin(result);showResult('❌','LOST','Try again');setStatus('Lost')}}});
    socket.on('error_msg',m=>{toast(m,'fail');if(!gameActive){$('play-btn').disabled=false;setStatus('Ready')}});
    socket.on('chips_credited',({chips,newBalance})=>{updChips(newBalance);toast('+'+chips+' chips!','success')});
    socket.on('transfer_complete',({amount,fee,newBalance})=>{updChips(newBalance);toast('Sent '+amount+' chips!','success');$('send-transfer-btn').disabled=false;setTimeout(hideTransfer,1500)});
    socket.on('withdrawal_complete',({chips})=>toast('Approved! KES '+chips+' sent.','success'));
    socket.on('withdrawal_rejected',({chips})=>{updChips(myChips+chips);toast('Rejected. Chips refunded.','warn')});
}

function bindEvents(){
    $('continue-btn').addEventListener('click',checkUser);$('submit-pin-btn').addEventListener('click',submitPin);$('back-btn').addEventListener('click',showPhone);
    $('logout-btn').addEventListener('click',logout);$('play-btn').addEventListener('click',e=>{e.preventDefault();findMatch()});$('cancel-btn').addEventListener('click',cancelSearch);
    $('buy-chips-btn').addEventListener('click',showBuyChips);$('close-chip-modal').addEventListener('click',hideBuyChips);$('verify-pay-btn').addEventListener('click',verifyPay);
    $('transfer-btn').addEventListener('click',showTransfer);$('close-transfer-modal').addEventListener('click',hideTransfer);$('send-transfer-btn').addEventListener('click',sendTransfer);
    $('withdraw-btn').addEventListener('click',showWithdraw);$('close-withdraw-modal').addEventListener('click',hideWithdraw);$('submit-withdraw-btn').addEventListener('click',submitWithdraw);
    $('invite-toggle').addEventListener('click',togInvite);$('create-room-btn').addEventListener('click',createRoom);$('join-room-btn').addEventListener('click',()=>joinRoom());$('cancel-room-btn').addEventListener('click',cancelRoom);
    $('dismiss-result').addEventListener('click',dismissResult);$('copy-code-btn').addEventListener('click',()=>navigator.clipboard.writeText($('display-room-code').textContent));
    $('phone-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkUser()});$('pin-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitPin()});
}

initSocket();initBoard();bindEvents();setTimeout(()=>{$('play-btn').disabled=false},500);
})();
</script>
